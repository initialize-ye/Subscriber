name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            RED='\033[0;31m'
            GREEN='\033[0;32m'
            YELLOW='\033[1;33m'
            NC='\033[0m'

            PROJECT_DIR="/home/ubuntu/Subscriber"
            SERVICE_NAME="subscriber"
            BACKUP_DIR="$PROJECT_DIR/.deploy_backup"
            RUNTIME_BACKUP_DIR="$BACKUP_DIR/runtime_data"
            RUNTIME_FILES=".env"

            restore_runtime() {
              for file in $RUNTIME_FILES; do
                if [ -f "$RUNTIME_BACKUP_DIR/$file" ]; then
                  cp -p "$RUNTIME_BACKUP_DIR/$file" "$file"
                  echo "已恢复运行时数据: $file"
                fi
              done
              if [ -d "$RUNTIME_BACKUP_DIR/data" ]; then
                cp -rp "$RUNTIME_BACKUP_DIR/data" "data"
                echo "已恢复 bison 数据目录"
              fi
            }

            retry() {
              local max=3 delay=5
              for i in $(seq 1 $max); do
                if "$@"; then return 0; fi
                echo -e "${YELLOW}⚠ 第 $i/$max 次失败，${delay}s 后重试...${NC}"
                sleep $delay
              done
              echo -e "${RED}✗ 重试 $max 次后仍然失败${NC}"
              return 1
            }

            echo -e "${GREEN}=== 部署开始 ===${NC}"
            echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "提交: ${{ github.sha }}"
            echo "分支: ${{ github.ref_name }}"

            # 1. 进入项目目录（首次部署时自动克隆）
            echo -e "\n${GREEN}[1/10] 进入项目目录${NC}"
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "首次部署，克隆仓库..."
              retry git clone https://github.com/initialize-ye/Subscriber.git "$PROJECT_DIR"
            fi
            cd "$PROJECT_DIR"

            # 2. 备份当前版本与运行时数据
            echo -e "\n${GREEN}[2/10] 备份当前版本与运行时数据${NC}"
            mkdir -p "$BACKUP_DIR" "$RUNTIME_BACKUP_DIR"
            rm -f "$RUNTIME_BACKUP_DIR"/*
            CURRENT_COMMIT=$(git rev-parse HEAD)
            echo "$CURRENT_COMMIT" > "$BACKUP_DIR/last_commit.txt"
            echo "备份提交: $CURRENT_COMMIT"
            for file in $RUNTIME_FILES; do
              if [ -f "$file" ]; then
                cp -p "$file" "$RUNTIME_BACKUP_DIR/$file"
                echo "已备份运行时数据: $file"
              fi
            done
            if [ -d "data" ]; then
              cp -rp "data" "$RUNTIME_BACKUP_DIR/data"
              echo "已备份 bison 数据目录"
            fi

            # 3. 拉取最新代码
            echo -e "\n${GREEN}[3/10] 拉取最新代码${NC}"
            retry git fetch origin main
            git reset --hard origin/main
            restore_runtime
            NEW_COMMIT=$(git rev-parse HEAD)
            echo "新提交: $NEW_COMMIT"

            # 检查是否有更新
            if [ "$CURRENT_COMMIT" = "$NEW_COMMIT" ]; then
              echo -e "${YELLOW}⚠ 代码无变化，跳过部署${NC}"
              exit 0
            fi

            # 4. 显示变更
            echo -e "\n${GREEN}[4/10] 代码变更${NC}"
            git log --oneline --no-decorate "$CURRENT_COMMIT..$NEW_COMMIT" | head -5

            # 5. 创建虚拟环境（仅首次）& 安装依赖
            echo -e "\n${GREEN}[5/10] 更新依赖${NC}"
            if [ ! -d ".venv" ]; then
              echo "创建虚拟环境..."
              python3 -m venv .venv
            fi
            "$PROJECT_DIR/.venv/bin/pip" install -r requirements.txt -q --no-cache-dir
            echo "✓ 依赖已更新"

            # 6. 应用 bison 补丁
            echo -e "\n${GREEN}[6/10] 应用 bison 补丁${NC}"
            "$PROJECT_DIR/.venv/bin/python" "$PROJECT_DIR/patch_bison.py"

            # 7. 检查 Playwright Chromium（本地已有则跳过下载）
            echo -e "\n${GREEN}[7/10] 检查 Playwright${NC}"
            CHROME_PATH="$HOME/.local/share/nonebot2/nonebot_plugin_htmlrender/chromium_headless_shell-1217"
            if [ -f "$CHROME_PATH/chrome-headless-shell-linux64/chrome-headless-shell" ] || [ -d "$HOME/.cache/ms-playwright/chromium-1217" ]; then
              echo "✓ Playwright 浏览器已安装"
            else
              echo "安装 Playwright Chromium..."
              "$PROJECT_DIR/.venv/bin/playwright" install chromium 2>/dev/null || echo -e "${YELLOW}⚠ 下载失败（htmlrender 会自动处理）${NC}"
            fi

            # 8. 语法检查（所有 Python 文件）
            echo -e "\n${GREEN}[8/10] 语法检查${NC}"
            for pyfile in bot.py my_plugins/help.py my_plugins/cookie_mgr.py patch_bison.py; do
              if "$PROJECT_DIR/.venv/bin/python" -m py_compile "$PROJECT_DIR/$pyfile" 2>/dev/null; then
                echo "  ✓ $pyfile"
              else
                echo -e "${RED}  ✗ $pyfile 语法错误，回滚部署${NC}"
                git reset --hard "$CURRENT_COMMIT"
                exit 1
              fi
            done

            # 9. 检查配置
            echo -e "\n${GREEN}[9/10] 检查配置${NC}"
            if [ ! -f .env ]; then
              echo -e "${RED}✗ .env 文件不存在，请先在服务器上创建${NC}"
              exit 1
            else
              echo "✓ .env 存在"
            fi

            # 10. 创建 systemd 服务（仅首次）& 重启
            echo -e "\n${GREEN}[10/10] 重启服务${NC}"
            if [ ! -f "/etc/systemd/system/${SERVICE_NAME}.service" ]; then
              echo "创建 systemd 服务..."
              sudo tee /etc/systemd/system/${SERVICE_NAME}.service > /dev/null << SVCEOF
            [Unit]
            Description=Subscriber QQ Bot (nonebot-bison)
            After=network.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=$PROJECT_DIR
            ExecStart=$PROJECT_DIR/.venv/bin/python bot.py
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SVCEOF
              sudo systemctl daemon-reload
              sudo systemctl enable "$SERVICE_NAME"
            fi
            sudo systemctl daemon-reload
            sudo systemctl restart "$SERVICE_NAME"

            # 健康检查
            sleep 5
            if sudo systemctl is-active "$SERVICE_NAME" --quiet; then
              echo -e "${GREEN}✓ 服务运行中${NC}"

              if sudo journalctl -u "$SERVICE_NAME" -n 50 --no-pager | grep -i "error\|exception\|failed" > /dev/null; then
                echo -e "${YELLOW}⚠ 发现错误日志，请检查${NC}"
                sudo journalctl -u "$SERVICE_NAME" -n 20 --no-pager
              else
                echo -e "${GREEN}✓ 无错误日志${NC}"
              fi

              echo -e "\n${GREEN}最近日志:${NC}"
              sudo journalctl -u "$SERVICE_NAME" -n 10 --no-pager --output=short
              echo -e "\n${GREEN}=== 部署成功 ===${NC}"
              echo "版本: $CURRENT_COMMIT -> $NEW_COMMIT"

            else
              echo -e "${RED}✗ 服务启动失败，回滚部署${NC}"
              echo -e "\n${RED}错误日志:${NC}"
              sudo journalctl -u "$SERVICE_NAME" -n 30 --no-pager

              echo -e "\n${YELLOW}回滚到上一版本...${NC}"
              git reset --hard "$CURRENT_COMMIT"
              restore_runtime
              sudo systemctl restart "$SERVICE_NAME"
              sleep 3

              if sudo systemctl is-active "$SERVICE_NAME" --quiet; then
                echo -e "${GREEN}✓ 回滚成功${NC}"
              else
                echo -e "${RED}✗ 回滚失败，需要手动介入${NC}"
              fi
              exit 1
            fi

      - name: Deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 部署成功"
          else
            echo "❌ 部署失败"
          fi
